<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>HONO CMS</title>
    <style>
      body {
        margin: 0;
        background: #f8f4ec;
        color: #1e1b18;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .cms-loading {
        align-items: center;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 32px;
        text-align: center;
      }

      .cms-loading h1 {
        font-size: 34px;
        font-weight: 500;
        letter-spacing: 0.16em;
        margin: 0 0 12px;
      }

      .cms-loading p {
        color: #7a6652;
        line-height: 1.7;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="cms-loading">
      <div>
        <h1>HONO CMS</h1>
        <p>Loading content editor...</p>
      </div>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
